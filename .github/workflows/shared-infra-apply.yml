name: Shared Infrastructure Apply

on:
  workflow_dispatch:
    inputs:
      entra_admin_object_id:
        description: "Object ID of the Entra ID user or group to set as PostgreSQL Entra ID administrator"
        required: true
        type: string
      entra_admin_principal_name:
        description: "UPN or display name of the Entra ID PostgreSQL administrator"
        required: true
        type: string

permissions:
  contents: read

jobs:
  apply:
    name: Apply Shared Infrastructure
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269ef032 # v3

      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb7411f9b8a12 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: infra/shared
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ vars.AZURE_TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.AZURE_TF_STATE_CONTAINER }}" \
            -backend-config="key=shared.tfstate" \
            -backend-config="resource_group_name=${{ vars.AZURE_SHARED_RESOURCE_GROUP }}" \
            -backend-config="use_oidc=true"

      - name: Terraform Validate
        working-directory: infra/shared
        run: terraform validate

      - name: Terraform Plan
        working-directory: infra/shared
        run: |
          terraform plan \
            -var="entra_admin_object_id=${{ inputs.entra_admin_object_id }}" \
            -var="entra_admin_principal_name=${{ inputs.entra_admin_principal_name }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: infra/shared
        run: terraform apply -auto-approve tfplan

      - name: Show Outputs
        working-directory: infra/shared
        run: |
          echo "### Shared Infrastructure Outputs" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Set these as GitHub repository variables if not already configured:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Variable | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`AZURE_POSTGRESQL_SERVER_NAME\` | $(terraform output -raw server_name) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`AZURE_POSTGRESQL_SERVER_FQDN\` | $(terraform output -raw server_fqdn) |" >> "$GITHUB_STEP_SUMMARY"
