name: PR Teardown

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  teardown:
    name: Destroy PR Environment
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"
      TF_VAR_environment: pr-${{ github.event.pull_request.number }}
      TF_VAR_resource_group_name: ${{ vars.AZURE_PR_RESOURCE_GROUP }}
      TF_VAR_postgresql_server_name: ${{ vars.AZURE_PR_POSTGRESQL_SERVER_NAME }}
      TF_VAR_postgresql_server_fqdn: ${{ vars.AZURE_PR_POSTGRESQL_SERVER_FQDN }}
      TF_VAR_vnet_cidr: "10.${{ github.event.pull_request.number }}.0.0/16"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ vars.AZURE_TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.AZURE_TF_STATE_CONTAINER }}" \
            -backend-config="key=pr-${{ github.event.pull_request.number }}.tfstate" \
            -backend-config="resource_group_name=${{ vars.AZURE_PR_SHARED_RESOURCE_GROUP }}" \
            -backend-config="use_oidc=true"

      - name: Terraform Destroy
        working-directory: infra
        run: terraform destroy -auto-approve
