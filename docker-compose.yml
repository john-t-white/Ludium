name: ludium

services:
  db:
    image: postgres:17-alpine
    container_name: ludium-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ludium
      POSTGRES_USER: ludium
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports:
      - "5432:5432"
    volumes:
      - ludium-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ludium -d ludium"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  ludium-pgdata:
